workflows:
  ios-testflight-rehearsal:
    name: iOS TestFlight Rehearsal
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: "DecoyWallet Codemagic"
    environment:
      groups:
        - decoy_public_runtime
        - decoy_ios_testflight
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.decoywalletapp.app
      vars:
        BUNDLE_ID: "com.decoywalletapp.app"
        DECOY_SOURCE_REPOSITORY: "https://github.com/decoywalletapp/decoy-wallet-open-source"
        DECOY_BUILD_CHANNEL: "codemagic"
        DECOY_BUILD_PLATFORM: "ios"
        DECOY_BUILD_VERIFICATION: "testflight-rehearsal"
      flutter: "3.41.6"
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Confirm public source checkout
        script: |
          set -eu
          if [ "${CM_REPO_SLUG:-}" != "decoywalletapp/decoy-wallet-open-source" ]; then
            echo "This rehearsal must run from decoywalletapp/decoy-wallet-open-source."
            exit 1
          fi
          if [ -z "${CM_COMMIT:-}" ]; then
            echo "CM_COMMIT is required for source provenance."
            exit 1
          fi
          echo "Building public source ${CM_REPO_SLUG} at ${CM_COMMIT}."
      - name: Validate rehearsal environment
        script: |
          set -eu
          missing=""
          for var in \
            APP_STORE_APPLE_ID \
            DECOY_SUPABASE_URL \
            DECOY_SUPABASE_ANON_KEY \
            DECOY_FIREBASE_WEB_API_KEY \
            DECOY_FIREBASE_WEB_AUTH_DOMAIN \
            DECOY_FIREBASE_PROJECT_ID \
            DECOY_FIREBASE_STORAGE_BUCKET \
            DECOY_FIREBASE_MESSAGING_SENDER_ID \
            DECOY_FIREBASE_WEB_APP_ID \
            DECOY_FIREBASE_FUNCTIONS_BASE_URL \
            DECOY_ALERT_BASE_URL \
            DECOY_DATA_KEY_BASE_URL \
            DECOY_PAYMENT_BASE_URL \
            DECOY_VERIFY_BASE_URL \
            DECOY_EMAIL_CONFIRM_URL \
            DECOY_EMAIL_CONFIRM_DEEP_LINK \
            DECOY_LEGAL_BASE_URL \
            DECOY_SUPPORT_EMAIL \
            DECOY_BILLING_RETURN_URL \
            DECOY_TUTORIAL_VIDEO_BASE_URL \
            IOS_FIREBASE_API_KEY \
            IOS_FIREBASE_SENDER_ID \
            IOS_FIREBASE_PROJECT_ID \
            IOS_FIREBASE_STORAGE_BUCKET \
            IOS_FIREBASE_APP_ID
          do
            eval "value=\${$var:-}"
            if [ -z "$value" ]; then
              missing="$missing $var"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Missing required CodeMagic environment variables:$missing"
            exit 1
          fi

          invalid=""
          require_https_url() {
            name="$1"
            eval "value=\${$name:-}"
            case "$value" in
              *[[:space:]]*) invalid="$invalid $name(has whitespace)" ;;
            esac
            case "$value" in
              https://*) ;;
              *) invalid="$invalid $name(must start with https://)" ;;
            esac
          }
          require_scheme_url() {
            name="$1"
            eval "value=\${$name:-}"
            case "$value" in
              *[[:space:]]*) invalid="$invalid $name(has whitespace)" ;;
            esac
            case "$value" in
              *://*) ;;
              *) invalid="$invalid $name(must be a URL or deep link)" ;;
            esac
          }

          for var in \
            DECOY_SUPABASE_URL \
            DECOY_FIREBASE_FUNCTIONS_BASE_URL \
            DECOY_ALERT_BASE_URL \
            DECOY_DATA_KEY_BASE_URL \
            DECOY_PAYMENT_BASE_URL \
            DECOY_VERIFY_BASE_URL \
            DECOY_EMAIL_CONFIRM_URL \
            DECOY_LEGAL_BASE_URL \
            DECOY_TUTORIAL_VIDEO_BASE_URL
          do
            require_https_url "$var"
          done
          require_scheme_url DECOY_EMAIL_CONFIRM_DEEP_LINK
          require_scheme_url DECOY_BILLING_RETURN_URL

          case "$DECOY_SUPABASE_ANON_KEY" in
            *[[:space:]]*) invalid="$invalid DECOY_SUPABASE_ANON_KEY(has whitespace)" ;;
          esac
          case "$DECOY_SUPABASE_ANON_KEY" in
            *.*.*) ;;
            *) invalid="$invalid DECOY_SUPABASE_ANON_KEY(expected JWT shape)" ;;
          esac
          case "$DECOY_SUPPORT_EMAIL" in
            *[[:space:]]*) invalid="$invalid DECOY_SUPPORT_EMAIL(has whitespace)" ;;
          esac
          case "$DECOY_SUPPORT_EMAIL" in
            *@*.*) ;;
            *) invalid="$invalid DECOY_SUPPORT_EMAIL(expected email shape)" ;;
          esac
          case "$IOS_FIREBASE_SENDER_ID" in
            ""|*[!0-9]*) invalid="$invalid IOS_FIREBASE_SENDER_ID(expected digits)" ;;
          esac
          case "$IOS_FIREBASE_APP_ID" in
            1:*:ios:*) ;;
            *) invalid="$invalid IOS_FIREBASE_APP_ID(expected iOS app id shape)" ;;
          esac

          if [ -n "$invalid" ]; then
            echo "Invalid CodeMagic environment variables:$invalid"
            exit 1
          fi
      - name: Create iOS Firebase plist
        script: |
          set -eu
          cat > ios/Runner/GoogleService-Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>${IOS_FIREBASE_API_KEY}</string>
            <key>GCM_SENDER_ID</key>
            <string>${IOS_FIREBASE_SENDER_ID}</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>${BUNDLE_ID}</string>
            <key>PROJECT_ID</key>
            <string>${IOS_FIREBASE_PROJECT_ID}</string>
            <key>STORAGE_BUCKET</key>
            <string>${IOS_FIREBASE_STORAGE_BUCKET}</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <true/>
            <key>IS_GCM_ENABLED</key>
            <true/>
            <key>IS_SIGNIN_ENABLED</key>
            <true/>
            <key>GOOGLE_APP_ID</key>
            <string>${IOS_FIREBASE_APP_ID}</string>
          </dict>
          </plist>
          PLIST
          plutil -lint ios/Runner/GoogleService-Info.plist
      - name: Resolve version and source ref
        script: |
          set -eu
          app_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml | cut -d+ -f1)"
          if [ -z "$app_version" ]; then
            echo "Could not read app version from pubspec.yaml."
            exit 1
          fi

          timestamp_build_number="$(date -u +%Y%m%d%H%M%S)"
          latest_build_number="$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
          case "$latest_build_number" in
            ""|*[!0-9]*) latest_build_number=0 ;;
          esac

          if [ "$timestamp_build_number" -le "$latest_build_number" ]; then
            app_build_number=$((latest_build_number + 1))
          else
            app_build_number="$timestamp_build_number"
          fi
          source_ref="${CM_TAG:-${CM_BRANCH:-manual}}"

          echo "APP_VERSION=$app_version" >> "$CM_ENV"
          echo "APP_BUILD_NUMBER=$app_build_number" >> "$CM_ENV"
          echo "DECOY_SOURCE_REF=$source_ref" >> "$CM_ENV"
      - name: Set up iOS code signing
        script: |
          set -eu
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Install Flutter packages
        script: |
          set -eu
          flutter pub get
      - name: Install CocoaPods
        script: |
          set -eu
          find . -name "Podfile" -execdir pod install \;
      - name: Run Flutter tests
        script: |
          set -eu
          flutter test
      - name: Build TestFlight IPA with source provenance
        script: |
          set -eu
          flutter build ipa --release \
            --build-name="$APP_VERSION" \
            --build-number="$APP_BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist \
            --dart-define=DECOY_SUPABASE_URL="$DECOY_SUPABASE_URL" \
            --dart-define=DECOY_SUPABASE_ANON_KEY="$DECOY_SUPABASE_ANON_KEY" \
            --dart-define=DECOY_FIREBASE_CONFIGURED=true \
            --dart-define=DECOY_FIREBASE_WEB_API_KEY="$DECOY_FIREBASE_WEB_API_KEY" \
            --dart-define=DECOY_FIREBASE_WEB_AUTH_DOMAIN="$DECOY_FIREBASE_WEB_AUTH_DOMAIN" \
            --dart-define=DECOY_FIREBASE_PROJECT_ID="$DECOY_FIREBASE_PROJECT_ID" \
            --dart-define=DECOY_FIREBASE_STORAGE_BUCKET="$DECOY_FIREBASE_STORAGE_BUCKET" \
            --dart-define=DECOY_FIREBASE_MESSAGING_SENDER_ID="$DECOY_FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=DECOY_FIREBASE_WEB_APP_ID="$DECOY_FIREBASE_WEB_APP_ID" \
            --dart-define=DECOY_FIREBASE_FUNCTIONS_BASE_URL="$DECOY_FIREBASE_FUNCTIONS_BASE_URL" \
            --dart-define=DECOY_ALERT_BASE_URL="$DECOY_ALERT_BASE_URL" \
            --dart-define=DECOY_DATA_KEY_BASE_URL="$DECOY_DATA_KEY_BASE_URL" \
            --dart-define=DECOY_PAYMENT_BASE_URL="$DECOY_PAYMENT_BASE_URL" \
            --dart-define=DECOY_VERIFY_BASE_URL="$DECOY_VERIFY_BASE_URL" \
            --dart-define=DECOY_EMAIL_CONFIRM_URL="$DECOY_EMAIL_CONFIRM_URL" \
            --dart-define=DECOY_EMAIL_CONFIRM_DEEP_LINK="$DECOY_EMAIL_CONFIRM_DEEP_LINK" \
            --dart-define=DECOY_LEGAL_BASE_URL="$DECOY_LEGAL_BASE_URL" \
            --dart-define=DECOY_SUPPORT_EMAIL="$DECOY_SUPPORT_EMAIL" \
            --dart-define=DECOY_BILLING_RETURN_URL="$DECOY_BILLING_RETURN_URL" \
            --dart-define=DECOY_TUTORIAL_VIDEO_BASE_URL="$DECOY_TUTORIAL_VIDEO_BASE_URL" \
            --dart-define=DECOY_SOURCE_REPOSITORY="$DECOY_SOURCE_REPOSITORY" \
            --dart-define=DECOY_SOURCE_REF="$DECOY_SOURCE_REF" \
            --dart-define=DECOY_SOURCE_COMMIT="$CM_COMMIT" \
            --dart-define=DECOY_BUILD_CHANNEL="$DECOY_BUILD_CHANNEL" \
            --dart-define=DECOY_BUILD_PLATFORM="$DECOY_BUILD_PLATFORM" \
            --dart-define=DECOY_BUILD_VERSION="$APP_VERSION" \
            --dart-define=DECOY_BUILD_NUMBER="$APP_BUILD_NUMBER" \
            --dart-define=DECOY_BUILD_VERIFICATION="$DECOY_BUILD_VERIFICATION"
      - name: Write public provenance summary
        script: |
          set -eu
          mkdir -p build/provenance
          cat > build/provenance/ios-testflight-rehearsal.txt <<EOF
          repository=${DECOY_SOURCE_REPOSITORY}
          ref=${DECOY_SOURCE_REF}
          commit=${CM_COMMIT}
          channel=${DECOY_BUILD_CHANNEL}
          platform=${DECOY_BUILD_PLATFORM}
          version=${APP_VERSION}
          build=${APP_BUILD_NUMBER}
          verification=${DECOY_BUILD_VERIFICATION}
          EOF
    artifacts:
      - build/ios/ipa/*.ipa
      - build/provenance/*.txt
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

  android-debug-rehearsal:
    name: Android Debug APK Rehearsal
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - decoy_public_runtime
      vars:
        ANDROID_PACKAGE_NAME: "com.decoywalletapp.app"
        ANDROID_FIREBASE_APP_ID: "1:866378207353:android:074e76d4b54f11c914c4a8"
        DECOY_SOURCE_REPOSITORY: "https://github.com/decoywalletapp/decoy-wallet-open-source"
        DECOY_BUILD_CHANNEL: "codemagic"
        DECOY_BUILD_PLATFORM: "android"
        DECOY_BUILD_VERIFICATION: "debug-apk-rehearsal"
      flutter: "3.41.6"
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Confirm public source checkout
        script: |
          set -eu
          if [ "${CM_REPO_SLUG:-}" != "decoywalletapp/decoy-wallet-open-source" ]; then
            echo "This rehearsal must run from decoywalletapp/decoy-wallet-open-source."
            exit 1
          fi
          if [ -z "${CM_COMMIT:-}" ]; then
            echo "CM_COMMIT is required for source provenance."
            exit 1
          fi
          echo "Building public Android source ${CM_REPO_SLUG} at ${CM_COMMIT}."
      - name: Validate Android rehearsal environment
        script: |
          set -eu
          missing=""
          for var in \
            DECOY_SUPABASE_URL \
            DECOY_SUPABASE_ANON_KEY \
            DECOY_FIREBASE_WEB_API_KEY \
            DECOY_FIREBASE_WEB_AUTH_DOMAIN \
            DECOY_FIREBASE_PROJECT_ID \
            DECOY_FIREBASE_STORAGE_BUCKET \
            DECOY_FIREBASE_MESSAGING_SENDER_ID \
            DECOY_FIREBASE_WEB_APP_ID \
            DECOY_FIREBASE_FUNCTIONS_BASE_URL \
            DECOY_ALERT_BASE_URL \
            DECOY_DATA_KEY_BASE_URL \
            DECOY_PAYMENT_BASE_URL \
            DECOY_VERIFY_BASE_URL \
            DECOY_EMAIL_CONFIRM_URL \
            DECOY_EMAIL_CONFIRM_DEEP_LINK \
            DECOY_LEGAL_BASE_URL \
            DECOY_SUPPORT_EMAIL \
            DECOY_BILLING_RETURN_URL \
            DECOY_TUTORIAL_VIDEO_BASE_URL \
            ANDROID_PACKAGE_NAME \
            ANDROID_FIREBASE_APP_ID
          do
            eval "value=\${$var:-}"
            if [ -z "$value" ]; then
              missing="$missing $var"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Missing required CodeMagic environment variables:$missing"
            exit 1
          fi

          invalid=""
          require_https_url() {
            name="$1"
            eval "value=\${$name:-}"
            case "$value" in
              *[[:space:]]*) invalid="$invalid $name(has whitespace)" ;;
            esac
            case "$value" in
              https://*) ;;
              *) invalid="$invalid $name(must start with https://)" ;;
            esac
          }
          require_scheme_url() {
            name="$1"
            eval "value=\${$name:-}"
            case "$value" in
              *[[:space:]]*) invalid="$invalid $name(has whitespace)" ;;
            esac
            case "$value" in
              *://*) ;;
              *) invalid="$invalid $name(must be a URL or deep link)" ;;
            esac
          }

          for var in \
            DECOY_SUPABASE_URL \
            DECOY_FIREBASE_FUNCTIONS_BASE_URL \
            DECOY_ALERT_BASE_URL \
            DECOY_DATA_KEY_BASE_URL \
            DECOY_PAYMENT_BASE_URL \
            DECOY_VERIFY_BASE_URL \
            DECOY_EMAIL_CONFIRM_URL \
            DECOY_LEGAL_BASE_URL \
            DECOY_TUTORIAL_VIDEO_BASE_URL
          do
            require_https_url "$var"
          done
          require_scheme_url DECOY_EMAIL_CONFIRM_DEEP_LINK
          require_scheme_url DECOY_BILLING_RETURN_URL

          case "$DECOY_SUPABASE_ANON_KEY" in
            *[[:space:]]*) invalid="$invalid DECOY_SUPABASE_ANON_KEY(has whitespace)" ;;
          esac
          case "$DECOY_SUPABASE_ANON_KEY" in
            *.*.*) ;;
            *) invalid="$invalid DECOY_SUPABASE_ANON_KEY(expected JWT shape)" ;;
          esac
          case "$DECOY_SUPPORT_EMAIL" in
            *[[:space:]]*) invalid="$invalid DECOY_SUPPORT_EMAIL(has whitespace)" ;;
          esac
          case "$DECOY_SUPPORT_EMAIL" in
            *@*.*) ;;
            *) invalid="$invalid DECOY_SUPPORT_EMAIL(expected email shape)" ;;
          esac
          case "$DECOY_FIREBASE_MESSAGING_SENDER_ID" in
            ""|*[!0-9]*) invalid="$invalid DECOY_FIREBASE_MESSAGING_SENDER_ID(expected digits)" ;;
          esac
          case "$ANDROID_FIREBASE_APP_ID" in
            1:*:android:*) ;;
            *) invalid="$invalid ANDROID_FIREBASE_APP_ID(expected Android app id shape)" ;;
          esac
          case "$ANDROID_PACKAGE_NAME" in
            com.decoywalletapp.app) ;;
            *) invalid="$invalid ANDROID_PACKAGE_NAME(expected com.decoywalletapp.app)" ;;
          esac

          if [ -n "$invalid" ]; then
            echo "Invalid CodeMagic environment variables:$invalid"
            exit 1
          fi
      - name: Create Android Firebase config
        script: |
          set -eu
          /usr/bin/python3 - <<'PY'
          import json
          import os

          config = {
              "project_info": {
                  "project_number": os.environ["DECOY_FIREBASE_MESSAGING_SENDER_ID"],
                  "project_id": os.environ["DECOY_FIREBASE_PROJECT_ID"],
                  "storage_bucket": os.environ["DECOY_FIREBASE_STORAGE_BUCKET"],
              },
              "client": [
                  {
                      "client_info": {
                          "mobilesdk_app_id": os.environ["ANDROID_FIREBASE_APP_ID"],
                          "android_client_info": {
                              "package_name": os.environ["ANDROID_PACKAGE_NAME"],
                          },
                      },
                      "api_key": [
                          {
                              "current_key": os.environ["DECOY_FIREBASE_WEB_API_KEY"],
                          }
                      ],
                      "services": {
                          "appinvite_service": {
                              "other_platform_oauth_client": [],
                          }
                      },
                  }
              ],
              "configuration_version": "1",
          }

          path = "android/app/google-services.json"
          with open(path, "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)
              f.write("\n")
          print(f"Wrote {path} for {os.environ['ANDROID_PACKAGE_NAME']}.")
          PY
          /usr/bin/python3 -m json.tool android/app/google-services.json >/dev/null
      - name: Resolve version and source ref
        script: |
          set -eu
          app_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml | cut -d+ -f1)"
          if [ -z "$app_version" ]; then
            echo "Could not read app version from pubspec.yaml."
            exit 1
          fi
          app_build_number="$(date -u +%Y%m%d%H%M%S)"
          source_ref="${CM_TAG:-${CM_BRANCH:-manual}}"

          echo "APP_VERSION=$app_version" >> "$CM_ENV"
          echo "APP_BUILD_NUMBER=$app_build_number" >> "$CM_ENV"
          echo "DECOY_SOURCE_REF=$source_ref" >> "$CM_ENV"
      - name: Install Flutter packages
        script: |
          set -eu
          flutter pub get
      - name: Confirm safety-critical guardrails
        script: |
          set -eu
          if ! grep -q "shouldSeedFakeBtcBalance" lib/app_state.dart; then
            echo "Missing fake BTC seed guardrail in app_state.dart"
            exit 1
          fi
          pin_page="lib/pin_pages/p_i_n_page/p_i_n_page_widget.dart"
          if ! grep -q "sendEmergencyAlertsCall" "$pin_page"; then
            echo "Duress PIN entry page no longer calls SendEmergencyAlerts"
            exit 1
          fi
          if grep -q "if (true)" "$pin_page"; then
            echo "Dangerous flattened duress alert gate detected"
            exit 1
          fi
          if ! grep -R "CommitDecoyCall.call" lib/create_decoy_seed >/dev/null; then
            echo "Decoy seed setup no longer calls commitDecoy"
            exit 1
          fi
      - name: Run Flutter tests
        script: |
          set -eu
          flutter test
      - name: Build Android debug APK with source provenance
        script: |
          set -eu
          flutter build apk --debug \
            --build-name="$APP_VERSION" \
            --build-number="$APP_BUILD_NUMBER" \
            --dart-define=DECOY_SUPABASE_URL="$DECOY_SUPABASE_URL" \
            --dart-define=DECOY_SUPABASE_ANON_KEY="$DECOY_SUPABASE_ANON_KEY" \
            --dart-define=DECOY_FIREBASE_CONFIGURED=true \
            --dart-define=DECOY_FIREBASE_WEB_API_KEY="$DECOY_FIREBASE_WEB_API_KEY" \
            --dart-define=DECOY_FIREBASE_WEB_AUTH_DOMAIN="$DECOY_FIREBASE_WEB_AUTH_DOMAIN" \
            --dart-define=DECOY_FIREBASE_PROJECT_ID="$DECOY_FIREBASE_PROJECT_ID" \
            --dart-define=DECOY_FIREBASE_STORAGE_BUCKET="$DECOY_FIREBASE_STORAGE_BUCKET" \
            --dart-define=DECOY_FIREBASE_MESSAGING_SENDER_ID="$DECOY_FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=DECOY_FIREBASE_WEB_APP_ID="$DECOY_FIREBASE_WEB_APP_ID" \
            --dart-define=DECOY_FIREBASE_FUNCTIONS_BASE_URL="$DECOY_FIREBASE_FUNCTIONS_BASE_URL" \
            --dart-define=DECOY_ALERT_BASE_URL="$DECOY_ALERT_BASE_URL" \
            --dart-define=DECOY_DATA_KEY_BASE_URL="$DECOY_DATA_KEY_BASE_URL" \
            --dart-define=DECOY_PAYMENT_BASE_URL="$DECOY_PAYMENT_BASE_URL" \
            --dart-define=DECOY_VERIFY_BASE_URL="$DECOY_VERIFY_BASE_URL" \
            --dart-define=DECOY_EMAIL_CONFIRM_URL="$DECOY_EMAIL_CONFIRM_URL" \
            --dart-define=DECOY_EMAIL_CONFIRM_DEEP_LINK="$DECOY_EMAIL_CONFIRM_DEEP_LINK" \
            --dart-define=DECOY_LEGAL_BASE_URL="$DECOY_LEGAL_BASE_URL" \
            --dart-define=DECOY_SUPPORT_EMAIL="$DECOY_SUPPORT_EMAIL" \
            --dart-define=DECOY_BILLING_RETURN_URL="$DECOY_BILLING_RETURN_URL" \
            --dart-define=DECOY_TUTORIAL_VIDEO_BASE_URL="$DECOY_TUTORIAL_VIDEO_BASE_URL" \
            --dart-define=DECOY_SOURCE_REPOSITORY="$DECOY_SOURCE_REPOSITORY" \
            --dart-define=DECOY_SOURCE_REF="$DECOY_SOURCE_REF" \
            --dart-define=DECOY_SOURCE_COMMIT="$CM_COMMIT" \
            --dart-define=DECOY_BUILD_CHANNEL="$DECOY_BUILD_CHANNEL" \
            --dart-define=DECOY_BUILD_PLATFORM="$DECOY_BUILD_PLATFORM" \
            --dart-define=DECOY_BUILD_VERSION="$APP_VERSION" \
            --dart-define=DECOY_BUILD_NUMBER="$APP_BUILD_NUMBER" \
            --dart-define=DECOY_BUILD_VERIFICATION="$DECOY_BUILD_VERIFICATION"
      - name: Write public provenance summary
        script: |
          set -eu
          mkdir -p build/provenance
          cat > build/provenance/android-firebase-rehearsal.txt <<EOF
          repository=${DECOY_SOURCE_REPOSITORY}
          ref=${DECOY_SOURCE_REF}
          commit=${CM_COMMIT}
          channel=${DECOY_BUILD_CHANNEL}
          platform=${DECOY_BUILD_PLATFORM}
          version=${APP_VERSION}
          build=${APP_BUILD_NUMBER}
          verification=${DECOY_BUILD_VERIFICATION}
          firebase_app_id=${ANDROID_FIREBASE_APP_ID}
          EOF
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/provenance/*.txt
      - flutter_drive.log
